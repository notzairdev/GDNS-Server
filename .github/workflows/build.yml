name: GDNS CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - "notzair/**"
    paths:
      - ".github/workflows/build.yml"
      - "api/**"
      - "caddy/**"
      - "dashboard/**"
      - "deploy/**"
      - "docker/**"
      - "docker-compose.prod.yml"
  pull_request:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --quiet --no-progress

      - name: Run API tests
        working-directory: api
        run: npm test

  dashboard:
    name: Dashboard lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci --quiet --no-progress

      - name: Lint dashboard
        working-directory: dashboard
        run: npm run lint

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose file
        env:
          DNS_DOMAIN: example.test
          CF_API_TOKEN: test-cloudflare-token
          ACME_EMAIL: admin@example.test
          AGH_USER: admin
          AGH_PASS: test-password
          AGH_PASS_HASH: test-password-hash
          API_SECRET: test-api-secret
          DASHBOARD_USER: admin
          DASHBOARD_PASS_HASH: test-dashboard-hash
        run: docker compose -f docker-compose.prod.yml config > /tmp/gdns-compose.yml
