name: GDNS CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
      - "notzair/**"
    paths:
      - ".github/workflows/build.yml"
      - "api/**"
      - "caddy/**"
      - "client/**"
      - "dashboard/**"
      - "deploy/**"
      - "docker/**"
      - "docker-compose.prod.yml"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "main.go"
  pull_request:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --quiet --no-progress

      - name: Audit API dependencies
        working-directory: api
        run: npm audit --audit-level=low

      - name: Run API tests
        working-directory: api
        run: npm test

  dashboard:
    name: Dashboard lint and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci --quiet --no-progress

      - name: Audit dashboard dependencies
        working-directory: dashboard
        run: npm audit --audit-level=low

      - name: Lint dashboard
        working-directory: dashboard
        run: npm run lint

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  client:
    name: Upstream client security and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci --quiet --no-progress

      - name: Audit client dependencies
        working-directory: client
        run: npm audit --audit-level=low

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Typecheck client
        working-directory: client
        run: npm run typecheck

      - name: Test client
        working-directory: client
        run: npm test

      - name: Build client
        working-directory: client
        run: npm run build-prod

  go:
    name: Go tests and vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: go.sum

      - name: Run Go tests
        run: go test ./...

      - name: Scan Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.2.0 ./...

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate production compose file
        env:
          DNS_DOMAIN: example.test
          CF_API_TOKEN: test-cloudflare-token
          ACME_EMAIL: admin@example.test
          AGH_USER: admin
          AGH_PASS: test-password
          AGH_PASS_HASH: test-password-hash
          API_SECRET: test-api-secret
          DASHBOARD_USER: admin
          DASHBOARD_PASS_HASH: test-dashboard-hash
        run: docker compose -f docker-compose.prod.yml config > /tmp/gdns-compose.yml
