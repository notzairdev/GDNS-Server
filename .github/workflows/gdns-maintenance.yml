name: GDNS Maintenance

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '41 7 * * 0'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_PORT: ${{ secrets.VM_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "$VM_HOST"
          test -n "$VM_USER"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/gdns_key
          chmod 600 ~/.ssh/gdns_key
          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Upload latest scripts
        run: |
          tar -czf - deploy/scripts | \
            ssh -i ~/.ssh/gdns_key -p "$VM_PORT" "$VM_USER@$VM_HOST" 'tar -xzf - -C /opt/gdns'
          ssh -i ~/.ssh/gdns_key -p "$VM_PORT" "$VM_USER@$VM_HOST" 'chmod +x /opt/gdns/deploy/scripts/*.sh'

      - name: Backup, renew, and healthcheck
        run: |
          ssh -i ~/.ssh/gdns_key -p "$VM_PORT" "$VM_USER@$VM_HOST" <<'REMOTE'
          set -euo pipefail
          cd /opt/gdns
          ./deploy/scripts/backup.sh
          ./deploy/scripts/renew-certs.sh
          ./deploy/scripts/healthcheck.sh
          docker image prune -f
          REMOTE
