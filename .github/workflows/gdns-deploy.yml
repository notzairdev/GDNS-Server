name: GDNS Deploy

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable GHCR image tag, normally the full commit SHA
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_PORT: ${{ secrets.VM_PORT || '22' }}
      GHCR_USER: ${{ github.actor }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_HOST_KEY: ${{ secrets.VM_SSH_HOST_KEY }}
        run: |
          test -n "$VM_HOST"
          test -n "$VM_USER"
          test -n "$VM_SSH_KEY"
          test -n "$VM_SSH_HOST_KEY"
          case "$VM_PORT" in *[!0-9]*|'') exit 1 ;; esac
          case "$IMAGE_TAG" in *[!A-Za-z0-9_.-]*|'') exit 1 ;; esac
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/gdns_key
          printf '%s\n' "$VM_SSH_HOST_KEY" > ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host gdns-production
            HostName $VM_HOST
            User $VM_USER
            Port $VM_PORT
            IdentityFile ~/.ssh/gdns_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            BatchMode yes
          EOF
          chmod 600 ~/.ssh/gdns_key
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts

      - name: Build dashboard
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Compile dashboard assets
        working-directory: dashboard
        run: |
          npm ci --quiet --no-progress
          npm run build

      - name: Upload deploy bundle
        run: |
          ssh gdns-production 'sudo mkdir -p /opt/gdns'
          tar -czf - docker-compose.prod.yml caddy dashboard/dist deploy/scripts deploy/hardening | \
            ssh gdns-production 'sudo tar -xzf - -C /opt/gdns'
          ssh gdns-production 'sudo chmod +x /opt/gdns/deploy/scripts/*.sh && sudo chmod -R go-w /opt/gdns'

      - name: Deploy stack
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          test -n "$PROD_ENV_FILE"
          printf '%s\n' "$PROD_ENV_FILE" | ssh gdns-production '
            set -e
            umask 077
            tmp="$(mktemp /opt/gdns/.env.XXXXXX)"
            trap '\''rm -f "$tmp"'\'' EXIT
            cat > "$tmp"
            chmod 600 "$tmp"
            mv -f "$tmp" /opt/gdns/.env
            trap - EXIT
          '

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | \
              ssh gdns-production "docker login ghcr.io -u '$GHCR_USER' --password-stdin"
          fi

          ssh gdns-production \
            "IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /opt/gdns
          trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
          else
            printf '\nIMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
          fi

          chmod 600 .env
          test -n "$(grep -E '^DNS_DOMAIN=' .env | cut -d= -f2-)"

          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker logout ghcr.io >/dev/null 2>&1 || true
          trap - EXIT
          docker compose --env-file .env -f docker-compose.prod.yml --profile certs run --rm -T certbot </dev/null
          docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

          for attempt in $(seq 1 24); do
            if ./deploy/scripts/healthcheck.sh; then
              docker image prune -f
              exit 0
            fi

            echo "Healthcheck attempt ${attempt} failed; retrying..."
            sleep 5
          done

          docker compose --env-file .env -f docker-compose.prod.yml logs --tail=200
          exit 1
          REMOTE

      - name: Remove deployment credentials
        if: always()
        continue-on-error: true
        run: |
          if [ -f ~/.ssh/config ]; then
            ssh gdns-production 'docker logout ghcr.io >/dev/null 2>&1 || true'
          fi
          rm -f ~/.ssh/gdns_key ~/.ssh/known_hosts ~/.ssh/config
