name: GDNS Images

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'notzair/**'
    paths:
      - '.github/workflows/gdns-images.yml'
      - 'api/**'
      - 'caddy/**'
      - 'client/**'
      - 'deploy/**'
      - 'docker/adguardhome-entrypoint.sh'
      - 'docker/adguardhome.Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'main.go'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --quiet --no-progress

      - name: Test API
        working-directory: api
        run: npm test

  build-and-push:
    needs:
      - test-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gdns-adguardhome
            context: .
            dockerfile: docker/adguardhome.Dockerfile
          - name: gdns-api
            context: ./api
            dockerfile: ./api/Dockerfile
          - name: gdns-caddy
            context: ./caddy
            dockerfile: ./caddy/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ github.sha }}
