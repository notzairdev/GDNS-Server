name: GDNS Images

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'notzair/**'
    paths:
      - '.github/workflows/gdns-images.yml'
      - 'api/**'
      - 'caddy/**'
      - 'client/**'
      - 'dashboard/**'
      - 'deploy/**'
      - 'docker/adguardhome-entrypoint.sh'
      - 'docker/adguardhome.Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'internal/**'
      - 'main.go'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci --quiet --no-progress

      - name: Test API
        working-directory: api
        run: npm test

  build-and-push:
    needs:
      - test-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gdns-adguardhome
            context: .
            dockerfile: docker/adguardhome.Dockerfile
          - name: gdns-api
            context: ./api
            dockerfile: ./api/Dockerfile
          - name: gdns-caddy
            context: .
            dockerfile: ./caddy/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ github.sha }}
