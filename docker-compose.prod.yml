name: gdns

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  adguardhome:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-adguardhome:${IMAGE_TAG:-latest}
    container_name: gdns-adguardhome
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 256
    mem_limit: 1536m
    tmpfs:
      - /tmp:mode=1777,nosuid,nodev,noexec,size=64m
    ports:
      - "${DNS_BIND_IP:-0.0.0.0}:853:853/tcp"
      - "${DNS_BIND_IP:-0.0.0.0}:784:784/udp"
    environment:
      DNS_DOMAIN: ${DNS_DOMAIN}
      AGH_USER: ${AGH_USER}
      AGH_PASS_HASH: ${AGH_PASS_HASH}
      AGH_TLS_CERT_PATH: ${AGH_TLS_CERT_PATH:-/opt/adguardhome/certs/dns.${DNS_DOMAIN}/fullchain.pem}
      AGH_TLS_KEY_PATH: ${AGH_TLS_KEY_PATH:-/opt/adguardhome/certs/dns.${DNS_DOMAIN}/privkey.pem}
    volumes:
      - agh_conf:/opt/adguardhome/conf
      - agh_work:/opt/adguardhome/work
      - profile_filters:/opt/adguardhome/profile-filters:ro
      - ./certs/runtime:/opt/adguardhome/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  api-permissions:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-api:${IMAGE_TAG:-latest}
    restart: "no"
    logging: *default-logging
    user: "0:0"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    pids_limit: 32
    mem_limit: 128m
    entrypoint: ["/bin/chown"]
    command: ["-R", "1000:1000", "/app/data", "/app/profile-filters"]
    volumes:
      - api_data:/app/data
      - profile_filters:/app/profile-filters

  api:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-api:${IMAGE_TAG:-latest}
    container_name: gdns-api
    restart: unless-stopped
    logging: *default-logging
    user: "1000:1000"
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    tmpfs:
      - /tmp:mode=1777,nosuid,nodev,noexec,size=128m
    environment:
      AGH_INTERNAL_URL: http://adguardhome:3000
      AGH_USER: ${AGH_USER}
      AGH_PASS: ${AGH_PASS}
      API_SECRET: ${API_SECRET}
      DNS_DOMAIN: ${DNS_DOMAIN}
      PLAIN_DNS_IP: ${PLAIN_DNS_IP:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      NEXTDNS_DOT_DOMAIN: ${NEXTDNS_DOT_DOMAIN:-dns.nextdns.io}
      PROFILE_FILTERS_DIR: /app/profile-filters
      AGH_PROFILE_FILTERS_DIR: /opt/adguardhome/profile-filters
      NODE_ENV: production
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/npm-cache
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      PORT: 4000
      DB_PATH: /app/data/profiles.db
    volumes:
      - api_data:/app/data
      - profile_filters:/app/profile-filters
    depends_on:
      adguardhome:
        condition: service_healthy
      api-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy-permissions:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-caddy:${IMAGE_TAG:-latest}
    restart: "no"
    logging: *default-logging
    user: "0:0"
    read_only: true
    network_mode: none
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    pids_limit: 32
    mem_limit: 128m
    entrypoint: ["/bin/chown"]
    command: ["-R", "1000:1000", "/data", "/config"]
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  caddy:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-caddy:${IMAGE_TAG:-latest}
    container_name: gdns-caddy
    user: "1000:1000"
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    mem_limit: 256m
    tmpfs:
      - /tmp:mode=1777,nosuid,nodev,noexec,size=64m
    ports:
      - "${HTTP_PORT:-80}:80/tcp"
      - "${HTTPS_PORT:-443}:443/tcp"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      DNS_DOMAIN: ${DNS_DOMAIN}
      CF_API_TOKEN: ${CF_API_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASS_HASH: ${DASHBOARD_PASS_HASH}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dashboard/dist:/srv/dashboard:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      adguardhome:
        condition: service_healthy
      api:
        condition: service_healthy
      caddy-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

  certbot:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-certbot:${IMAGE_TAG:-latest}
    profiles:
      - certs
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    pids_limit: 128
    mem_limit: 512m
    tmpfs:
      - /tmp:mode=0700,nosuid,nodev,noexec,size=32m
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./certs/lib:/var/lib/letsencrypt
      - ./certs/log:/var/log/letsencrypt
      - ./certs/runtime:/runtime
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        umask 077
        printf 'dns_cloudflare_api_token = %s\n' "$$CF_API_TOKEN" > /tmp/cloudflare.ini
        certbot certonly \
          --dns-cloudflare \
          --dns-cloudflare-credentials /tmp/cloudflare.ini \
          --dns-cloudflare-propagation-seconds ${CERTBOT_PROPAGATION_SECONDS:-60} \
          --non-interactive \
          --agree-tos \
          --email "${ACME_EMAIL}" \
          --keep-until-expiring \
          -d "dns.${DNS_DOMAIN}" \
          -d "*.dns.${DNS_DOMAIN}"
        runtime_dir="/runtime/dns.${DNS_DOMAIN}"
        fullchain_tmp="$$runtime_dir/.fullchain.pem.tmp"
        privkey_tmp="$$runtime_dir/.privkey.pem.tmp"
        trap 'rm -f "$$fullchain_tmp" "$$privkey_tmp"' EXIT
        mkdir -p "$$runtime_dir"
        chmod 0755 /runtime
        chmod 0750 "$$runtime_dir"
        chown 65534:65534 "$$runtime_dir"
        cp "/etc/letsencrypt/live/dns.${DNS_DOMAIN}/fullchain.pem" "$$fullchain_tmp"
        cp "/etc/letsencrypt/live/dns.${DNS_DOMAIN}/privkey.pem" "$$privkey_tmp"
        chmod 0640 "$$fullchain_tmp" "$$privkey_tmp"
        chown 65534:65534 "$$fullchain_tmp" "$$privkey_tmp"
        mv -f "$$fullchain_tmp" "$$runtime_dir/fullchain.pem"
        mv -f "$$privkey_tmp" "$$runtime_dir/privkey.pem"
        trap - EXIT

volumes:
  agh_conf:
  agh_work:
  api_data:
  profile_filters:
  caddy_data:
  caddy_config:
