name: gdns

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  adguardhome:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-adguardhome:${IMAGE_TAG:-latest}
    container_name: gdns-adguardhome
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/udp"
      - "${DNS_BIND_IP:-0.0.0.0}:53:53/tcp"
      - "${DNS_BIND_IP:-0.0.0.0}:853:853/tcp"
      - "${DNS_BIND_IP:-0.0.0.0}:784:784/udp"
    environment:
      DNS_DOMAIN: ${DNS_DOMAIN}
      AGH_USER: ${AGH_USER}
      AGH_PASS_HASH: ${AGH_PASS_HASH}
      AGH_TLS_CERT_PATH: ${AGH_TLS_CERT_PATH:-/opt/adguardhome/certs/dns.${DNS_DOMAIN}/fullchain.pem}
      AGH_TLS_KEY_PATH: ${AGH_TLS_KEY_PATH:-/opt/adguardhome/certs/dns.${DNS_DOMAIN}/privkey.pem}
    volumes:
      - agh_conf:/opt/adguardhome/conf
      - agh_work:/opt/adguardhome/work
      - ./certs/runtime:/opt/adguardhome/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  api:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-api:${IMAGE_TAG:-latest}
    container_name: gdns-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      AGH_INTERNAL_URL: http://adguardhome:3000
      AGH_USER: ${AGH_USER}
      AGH_PASS: ${AGH_PASS}
      API_SECRET: ${API_SECRET}
      DNS_DOMAIN: ${DNS_DOMAIN}
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /app/data/profiles.db
    volumes:
      - api_data:/app/data
    depends_on:
      adguardhome:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: ghcr.io/${GHCR_OWNER:-notzairdev}/gdns-caddy:${IMAGE_TAG:-latest}
    container_name: gdns-caddy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-80}:80/tcp"
      - "${HTTPS_PORT:-443}:443/tcp"
      - "${HTTPS_PORT:-443}:443/udp"
    environment:
      DNS_DOMAIN: ${DNS_DOMAIN}
      CF_API_TOKEN: ${CF_API_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASS_HASH: ${DASHBOARD_PASS_HASH}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      adguardhome:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

  certbot:
    image: certbot/dns-cloudflare:v2.11.0
    profiles:
      - certs
    restart: "no"
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./certs/lib:/var/lib/letsencrypt
      - ./certs/log:/var/log/letsencrypt
      - ./certs/runtime:/runtime
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        umask 077
        printf 'dns_cloudflare_api_token = %s\n' "$$CF_API_TOKEN" > /tmp/cloudflare.ini
        certbot certonly \
          --dns-cloudflare \
          --dns-cloudflare-credentials /tmp/cloudflare.ini \
          --dns-cloudflare-propagation-seconds ${CERTBOT_PROPAGATION_SECONDS:-60} \
          --non-interactive \
          --agree-tos \
          --email "${ACME_EMAIL}" \
          --keep-until-expiring \
          -d "dns.${DNS_DOMAIN}" \
          -d "*.dns.${DNS_DOMAIN}"
        runtime_dir="/runtime/dns.${DNS_DOMAIN}"
        mkdir -p "$$runtime_dir"
        cp "/etc/letsencrypt/live/dns.${DNS_DOMAIN}/fullchain.pem" "$$runtime_dir/fullchain.pem"
        cp "/etc/letsencrypt/live/dns.${DNS_DOMAIN}/privkey.pem" "$$runtime_dir/privkey.pem"
        chmod 0755 /runtime
        chown 65534:65534 "$$runtime_dir" "$$runtime_dir/fullchain.pem" "$$runtime_dir/privkey.pem"
        chmod 0750 "$$runtime_dir"
        chmod 0640 "$$runtime_dir/fullchain.pem" "$$runtime_dir/privkey.pem"

volumes:
  agh_conf:
  agh_work:
  api_data:
  caddy_data:
  caddy_config:
